<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스텔라 듀얼 - 서버 관제 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .glass-panel { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
        
        /* 마우스 오버 팝업(툴팁) 스타일 */
        #tooltip {
            position: absolute;
            display: none;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #3b82f6;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            pointer-events: none;
            min-width: 150px;
        }

        /* 슬롯 기본 스타일 */
        .slot {
            width: 60px; height: 80px;
            border: 2px dashed #4b5563;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            background-color: rgba(31, 41, 55, 0.5);
            transition: all 0.2s;
            cursor: pointer;
        }
        .slot.filled { border-style: solid; background-color: #374151; }
        .slot-member { border-radius: 50%; width: 70px; height: 70px; border-color: #a855f7; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen overflow-hidden flex flex-col relative">

    <!-- 마우스 오버 시 나타날 툴팁 -->
    <div id="tooltip"></div>

    <!-- 상단 네비게이션 바 -->
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center shadow-md z-10">
        <h1 class="text-xl font-bold tracking-wider text-white">STELLAR DUEL <span class="text-blue-400 text-sm ml-2">ADMIN</span></h1>
        <div class="flex items-center gap-4">
            <input type="text" id="serverUrl" value="http://localhost:5123" class="bg-gray-900 border border-gray-700 rounded px-3 py-1 text-sm focus:border-blue-500 text-gray-300 w-64">
            <div id="connectionStatus" class="text-yellow-400 text-sm font-medium">대기 중</div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- 왼쪽 방 목록 -->
        <aside class="w-72 bg-gray-800 border-r border-gray-700 flex flex-col">
            <div class="p-4 border-b border-gray-700 flex justify-between">
                <h2 class="font-semibold text-gray-200">📡 방 목록 (<span id="roomCount">0</span>)</h2>
                <button onclick="fetchRooms()">🔄</button>
            </div>
            <div id="roomList" class="flex-1 overflow-y-auto p-2"></div>
        </aside>

        <!-- 중앙 메인 대시보드 -->
        <main class="flex-1 p-6 overflow-y-auto bg-black relative">
            <div id="noRoomSelected" class="absolute inset-0 flex flex-col items-center justify-center text-gray-500">방을 선택해주세요</div>
            
            <div id="roomDetails" class="hidden max-w-5xl mx-auto space-y-4">
                
                <!-- 상단: 상태 및 시간 -->
                <div class="glass-panel p-4 rounded-xl border border-gray-700 flex justify-between items-center">
                    <h2 class="text-2xl font-bold" id="displayRoomId">-</h2>
                    <div class="text-center">
                        <div id="displayPhase" class="text-2xl font-black text-blue-400">WAITING</div>
                        <div class="text-red-400 font-mono text-sm mt-1">남은 시간: <span id="timeLeft">00:00</span></div>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-4">
                    <!-- 좌측: 플레이어 상태 보드 -->
                    <div class="col-span-3 space-y-4">
                        <!-- Player B (Opponent) -->
                        <div class="glass-panel rounded-xl p-4 border-t-4 border-t-blue-500 relative">
                            <div id="turnTagB" class="hidden absolute top-2 right-2 bg-blue-500 text-white text-[10px] px-2 rounded">TURN</div>
                            <h3 class="font-bold mb-2">🔵 Player B</h3>
                            <div class="text-sm">❤️ HP: <span id="hpB" class="font-bold text-red-400">0</span></div>
                            <div class="text-sm">🔷 Mana: <span id="manaB" class="font-bold text-blue-400">0</span></div>
                            <button onclick="openHandModal('B')" class="mt-3 w-full bg-blue-600/30 hover:bg-blue-600 border border-blue-500 rounded py-1 text-xs">손패 보기</button>
                        </div>
                        
                        <!-- Player A (Me) -->
                        <div class="glass-panel rounded-xl p-4 border-t-4 border-t-red-500 relative mt-16">
                            <div id="turnTagA" class="hidden absolute top-2 right-2 bg-red-500 text-white text-[10px] px-2 rounded">TURN</div>
                            <h3 class="font-bold mb-2">🔴 Player A</h3>
                            <div class="text-sm">❤️ HP: <span id="hpA" class="font-bold text-red-400">0</span></div>
                            <div class="text-sm">🔷 Mana: <span id="manaA" class="font-bold text-blue-400">0</span></div>
                            <button onclick="openHandModal('A')" class="mt-3 w-full bg-red-600/30 hover:bg-red-600 border border-red-500 rounded py-1 text-xs">손패 보기</button>
                        </div>
                    </div>

                    <!-- 중앙: 필드 시각화 -->
                    <div class="col-span-6 glass-panel rounded-xl p-6 border border-gray-700 flex flex-col justify-center">
                        <!-- Player B 필드 (위쪽) -->
                        <div class="mb-4 text-center">
                            <div class="text-xs text-gray-500 mb-2">Player B Minions</div>
                            <div class="flex justify-center gap-2" id="fieldB_Minions"></div>
                        </div>

                        <!-- 중앙 멤버존 (A와 B 마주보기) -->
                        <div class="flex justify-center gap-12 py-4 border-y border-gray-800">
                            <div class="text-center">
                                <div class="text-[10px] text-blue-400 mb-1">B Member</div>
                                <div id="fieldB_Member"></div>
                            </div>
                            <div class="text-center">
                                <div class="text-[10px] text-red-400 mb-1">A Member</div>
                                <div id="fieldA_Member"></div>
                            </div>
                        </div>

                        <!-- Player A 필드 (아래쪽) -->
                        <div class="mt-4 text-center">
                            <div class="flex justify-center gap-2" id="fieldA_Minions"></div>
                            <div class="text-xs text-gray-500 mt-2">Player A Minions</div>
                        </div>
                    </div>

                    <!-- 우측: 액션 로그 -->
                    <div class="col-span-3 glass-panel rounded-xl p-4 border border-gray-700 flex flex-col">
                        <h3 class="font-bold mb-2 text-sm">📜 이벤트 로그</h3>
                        <div id="logContainer" 
                        class="bg-[#0f172a] border border-gray-700 rounded-lg p-4 h-64 max-h-64 overflow-y-auto space-y-2 font-mono text-sm relative" 
                        style="max-height: 30rem; overflow-y: auto;">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 손패 모달 창 (기본 숨김) -->
    <div id="handModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center">
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-600 w-[600px] shadow-2xl relative">
            <button onclick="closeHandModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white">✖</button>
            <h2 id="handModalTitle" class="text-xl font-bold mb-4">손패 보기</h2>
            <div id="handContainer" class="flex flex-wrap gap-3 overflow-y-auto max-h-[400px]">
                <!-- 카드들이 여기에 동적으로 생성됨 -->
            </div>
        </div>
    </div>

<script>
    let currentSelectedRoomId = null;
    let roomDetailInterval = null;
    let latestSnapshot = null; // 최신 데이터 보관용

    // 툴팁 이벤트
    document.addEventListener('mousemove', (e) => {
        const tooltip = document.getElementById('tooltip');
        if(tooltip.style.display === 'block') {
            tooltip.style.left = (e.pageX + 15) + 'px';
            tooltip.style.top = (e.pageY + 15) + 'px';
        }
    });

    function showEntityTooltip(entity) {
        if(!entity) {
            document.getElementById('tooltip').innerHTML = "<div class='text-gray-400'>비어 있음</div>";
        } else {
            document.getElementById('tooltip').innerHTML = `
                <div class='font-bold text-lg mb-1'>${entity.cardName || entity.cardId}</div>
                <div class='text-sm text-gray-300'>공격력: <span class='text-yellow-400'>${entity.attack}</span></div>
                <div class='text-sm text-gray-300'>체력: <span class='text-red-400'>${entity.health}</span> / ${entity.maxHealth}</div>
                ${entity.canAttack ? "<div class='text-xs text-green-400 mt-1'>공격 가능</div>" : ""}
                ${entity.isMember ? "<div class='text-xs text-purple-400 mt-1'>멤버 개체</div>" : ""}
            `;
        }
        document.getElementById('tooltip').style.display = 'block';
    }

    function showCardTooltip(card) {
        document.getElementById('tooltip').innerHTML = `
            <div class='font-bold text-lg mb-1'>${card.cardName || card.cardId}</div>
            <div class='text-sm text-gray-300'>비용: <span class='text-blue-400'>${card.currentCost}</span></div>
            <div class='text-sm text-gray-300'>공격력: <span class='text-yellow-400'>${card.currentAttack}</span></div>
            <div class='text-sm text-gray-300'>체력: <span class='text-red-400'>${card.currentHealth}</span></div>
        `;
        document.getElementById('tooltip').style.display = 'block';
    }

    function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

    // 슬롯 렌더링 헬퍼 함수
    function createSlotHTML(entity, isMember) {
        const baseClass = isMember ? 'slot slot-member' : 'slot';
        if(!entity) return `<div class="${baseClass}" onmouseenter="showEntityTooltip(null)" onmouseleave="hideTooltip()"></div>`;
        
        return `
            <div class="${baseClass} filled border-green-500" onmouseenter='showEntityTooltip(${JSON.stringify(entity)})' onmouseleave='hideTooltip()'>
                <div class="text-center">
                    <div class="text-[10px] text-gray-300 break-all px-1 leading-tight mb-1">${entity.cardId}</div>
                    <div class="text-xs font-bold"><span class="text-yellow-400">${entity.attack}</span> / <span class="text-red-400">${entity.health}</span></div>
                </div>
            </div>`;
    }

    // 서버 폴링 및 데이터 처리
    async function fetchRooms() {
        try {
            const res = await fetch(`${document.getElementById('serverUrl').value}/api/admin/rooms`);
            const data = await res.json();
            document.getElementById('connectionStatus').innerText = "연결됨";
            
            // 방 목록 그리기
            const list = document.getElementById('roomList');
            list.innerHTML = '';
            document.getElementById('roomCount').innerText = data.rooms.length;
            data.rooms.forEach(id => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-2 rounded mb-1 text-sm ${id === currentSelectedRoomId ? 'bg-blue-600' : 'bg-gray-700 hover:bg-gray-600'}`;
                btn.innerText = id;
                btn.onclick = () => selectRoom(id);
                list.appendChild(btn);
            });
        } catch (e) {
            document.getElementById('connectionStatus').innerText = "연결 실패";
        }
    }

    function selectRoom(roomId) {
        currentSelectedRoomId = roomId;
        document.getElementById('noRoomSelected').classList.add('hidden');
        document.getElementById('roomDetails').classList.remove('hidden');
        document.getElementById('displayRoomId').innerText = `Room: ${roomId}`;
        
        if (roomDetailInterval) clearInterval(roomDetailInterval);
        fetchRoomDetails(roomId);
        roomDetailInterval = setInterval(() => fetchRoomDetails(roomId), 1000);
    }

    async function fetchRoomDetails(roomId) {
        try {
            const res = await fetch(`${document.getElementById('serverUrl').value}/api/admin/rooms/${roomId}`);
            const result = await res.json();
            if(result.status === 'success' && result.data) {
                latestSnapshot = result.data; // 스냅샷 보관 (손패 보기에 사용)
                updateUI(result.data);
            }
        } catch (e) { console.error(e); }
    }

    function updateUI(data) {
        document.getElementById('displayPhase').innerText = data.currentPhase;
        
        // 타이머 계산
        if(data.turnEndTime) {
            const now = Math.floor(Date.now() / 1000);
            const remain = Math.max(0, data.turnEndTime - now);
            const m = Math.floor(remain / 60).toString().padStart(2, '0');
            const s = (remain % 60).toString().padStart(2, '0');
            document.getElementById('timeLeft').innerText = `${m}:${s}`;
        }

        // 상태
        document.getElementById('hpA').innerText = data.playerAHealth;
        document.getElementById('manaA').innerText = data.playerAMana;
        document.getElementById('hpB').innerText = data.playerBHealth;
        document.getElementById('manaB').innerText = data.playerBMana;

        // 턴 표시기
        document.getElementById('turnTagA').classList.toggle('hidden', data.currentTurnPlayerUid !== data.playerAUid);
        document.getElementById('turnTagB').classList.toggle('hidden', data.currentTurnPlayerUid !== data.playerBUid);

        // 필드 렌더링 (서버에서 배열을 줬다고 가정)
        let htmlB = "", htmlA = "";
        for(let i=0; i<5; i++) {
            htmlB += createSlotHTML(data.playerBField ? data.playerBField[i] : null, false);
            htmlA += createSlotHTML(data.playerAField ? data.playerAField[i] : null, false);
        }
        document.getElementById('fieldB_Minions').innerHTML = htmlB;
        document.getElementById('fieldA_Minions').innerHTML = htmlA;

        // 멤버 렌더링
        document.getElementById('fieldB_Member').innerHTML = createSlotHTML(data.playerBMember && data.playerBMember ? data.playerBMember : null, true);
        document.getElementById('fieldA_Member').innerHTML = createSlotHTML(data.playerAMember && data.playerAMember ? data.playerAMember : null, true);

        // 로그
        if (data.logs) {
            const logBox = document.getElementById('logContainer');
            const isBottom = logBox.scrollHeight - logBox.scrollTop <= logBox.clientHeight + 20;
            
            logBox.innerHTML = data.logs.map(log => {
                const time = new Date(log.timestamp).toLocaleTimeString('ko-KR');
                const color = log.actor.includes('A') ? 'text-red-400' : 'text-blue-400';
                return `<div class="border-b border-gray-800 py-1"><span class="text-gray-500">[${time}]</span> <span class="${color}">${log.actor}:</span> ${log.message}</div>`;
            }).join('');
            
            if (isBottom) logBox.scrollTop = logBox.scrollHeight;
        }
    }

    // 손패 모달 로직
    function openHandModal(player) {
        if(!latestSnapshot) return;
        const cards = player === 'A' ? latestSnapshot.playerAHand : latestSnapshot.playerBHand;
        
        document.getElementById('handModalTitle').innerText = `Player ${player} 손패 (${cards ? cards.length : 0}장)`;
        const container = document.getElementById('handContainer');
        container.innerHTML = '';

        if(cards && cards.length > 0) {
            cards.forEach(card => {
                container.innerHTML += `
                    <div class="slot border-blue-500 filled" onmouseenter='showCardTooltip(${JSON.stringify(card)})' onmouseleave='hideTooltip()'>
                        <div class="text-center">
                            <div class="text-blue-400 font-bold mb-1 text-sm">${card.currentCost}</div>
                            <div class="text-[10px] truncate px-1 w-full text-gray-300">${card.cardId}</div>
                        </div>
                    </div>
                `;
            });
        } else {
            container.innerHTML = "<div class='text-gray-500'>손패가 비어있습니다.</div>";
        }
        
        document.getElementById('handModal').classList.remove('hidden');
    }

    function closeHandModal() {
        document.getElementById('handModal').classList.add('hidden');
        hideTooltip();
    }

    fetchRooms();
    setInterval(fetchRooms, 5000);
</script>
</body>
</html>
